host: "0.0.0.0"
port: 4000
cors:
  origin:
    - "http://127.0.0.1:5173"
    - "http://localhost:5173"
  credentials: true
  methods:
    - "GET"
    - "POST"
    - "OPTIONS"
  allowed_headers:
    - "content-type"
    - "authorization"
graphql:
  endpoint: "/graphql"
  graphiql: true
publicUrl: "http://localhost:4000"
webPublicUrl: "http://localhost:5173"
database:
  name: "companyhelm"
  host: "127.0.0.1"
  port: 5432
  roles:
    app_runtime:
      username: "app-runtime"
      password: "companyhelm-local-app-runtime-role-password"
    admin:
      username: "postgres"
      password: "postgres"
redis:
  host: "127.0.0.1"
  port: 6379
  username: ""
  password: ""
workers:
  routine_triggers:
    concurrency: 10
  session_process:
    concurrency: 100
agent_tools:
  read_image:
    max_source_bytes: 26214400
    max_return_bytes: 4194304
    default_resolution:
      width: 1280
      height: 1280
web_search:
  exa:
    api_key: "${EXA_API_KEY}"
# CompanyHelm default providers. Optional: seeds the managed CompanyHelm providers when present.
# Users can always add their own providers by adding the providers from UI if these are not present.
companyhelm:
  e2b:
    api_key: "${E2B_API_KEY}"
    desktop_resolution:
      width: 1920
      height: 1080
    # must match the E2B team name
    template_prefix: "realequityapps/"
  llm:
    openai_api_key: "${?COMPANYHELM_OPENAI_API_KEY}"
github:
  app_client_id: "${GITHUB_APP_CLIENT_ID}"
  public_repository_token: "${GITHUB_PUBLIC_REPOSITORY_TOKEN}"
  app_private_key_pem: "${GITHUB_APP_PRIVATE_KEY_PEM}"
  app_link: "${GITHUB_APP_URL}"
  key_id: "companyhelm-local-github-state-key"
auth:
  provider: "clerk"
  clerk:
    secret_key: "${CLERK_SECRET_KEY}"
    publishable_key: "${CLERK_PUBLISHABLE_KEY}"
    jwks_url: "${CLERK_JWKS_URL}"
    authorized_parties:
      - "http://localhost:5173"
      - "http://localhost:4000"
security:
  encryption:
    key: "companyhelm-local-encryption-key"
    key_id: "companyhelm-local-key"
log:
  level: "info"
  json: false
