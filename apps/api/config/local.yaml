host: "0.0.0.0"
port: 4000
cors:
  origin:
    - "http://127.0.0.1:5173"
    - "http://localhost:5173"
  credentials: true
  methods:
    - "GET"
    - "POST"
    - "OPTIONS"
  allowed_headers:
    - "content-type"
    - "authorization"
graphql:
  endpoint: "/graphql"
  graphiql: true
publicUrl: "http://localhost:4000"
database:
  name: "companyhelm"
  host: "127.0.0.1"
  port: 5432
  roles:
    app_runtime:
      username: "app-runtime"
      password: "companyhelm-local-app-runtime-role-password"
    admin:
      username: "postgres"
      password: "postgres"
redis:
  host: "127.0.0.1"
  port: 6379
  username: ""
  password: ""
workers:
  session_process:
    concurrency: 100
web_search:
  exa:
    api_key: "${EXA_API_KEY}"
companyhelm:
  e2b:
    api_key: "${E2B_API_KEY}"
    desktop_resolution:
      width: 1920
      height: 1080
    # must match the E2B team name
    template_prefix: "realequityapps/"
daytona:
  api_key: "${DAYTONA_API_KEY}"
  api_url: "https://app.daytona.io/api"
  disk_gb: 10
  memory_gb: 8
  cpu_count: 4
github:
  app_client_id: "${GITHUB_APP_CLIENT_ID}"
  app_private_key_pem: "${GITHUB_APP_PRIVATE_KEY_PEM}"
  app_link: "${GITHUB_APP_URL}"
auth:
  provider: "clerk"
  clerk:
    secret_key: "${CLERK_SECRET_KEY}"
    publishable_key: "${CLERK_PUBLISHABLE_KEY}"
    jwks_url: "${CLERK_JWKS_URL}"
    authorized_parties:
      - "http://localhost:5173"
      - "http://localhost:4000"
security:
  encryption:
    key: "companyhelm-local-encryption-key"
    key_id: "companyhelm-local-key"
log:
  level: "info"
  json: false
