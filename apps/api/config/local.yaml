host: "0.0.0.0"
port: 4000
cors:
  origin:
    - "http://127.0.0.1:5173"
    - "http://localhost:5173"
  credentials: true
  methods:
    - "GET"
    - "POST"
    - "OPTIONS"
  allowed_headers:
    - "content-type"
    - "authorization"
    - "x-dev-user-id"
    - "x-dev-company-id"
graphql:
  endpoint: "/graphql"
  graphiql: true
publicUrl: "http://localhost:4000"
webPublicUrl: "http://localhost:5173"
database:
  name: "companyhelm"
  host: "127.0.0.1"
  port: 5432
  roles:
    app_runtime:
      username: "app-runtime"
      password: "companyhelm-local-app-runtime-role-password"
    admin:
      username: "postgres"
      password: "postgres"
redis:
  host: "127.0.0.1"
  port: 6379
  username: ""
  password: ""
workers:
  company_deletions:
    concurrency: 2
  github_webhooks:
    concurrency: 10
  session_process:
    concurrency: 100
  workflow_triggers:
    concurrency: 10
agent_tools:
  read_image:
    max_source_bytes: 26214400
    max_return_bytes: 4194304
    default_resolution:
      width: 1280
      height: 1280
web_search:
  exa:
    api_key: "${EXA_API_KEY}"
# CompanyHelm default compute settings. Platform LLM credentials are stored in the database.
companyhelm:
  e2b:
    api_key: "${E2B_API_KEY}"
    desktop_resolution:
      width: 1920
      height: 1080
    # must match the E2B team name
    template_prefix: "realequityapps/"
github:
  # OAuth client id for the GitHub App. The frontend uses this when starting the app
  # installation flow, so it must match the app whose installation URL is configured below.
  app_client_id: "${GITHUB_APP_CLIENT_ID}"
  # PEM private key for signing GitHub App JWTs. GitHub uses those JWTs to issue
  # installation access tokens for repository discovery and webhook follow-up work.
  app_private_key_pem: "${GITHUB_APP_PRIVATE_KEY_PEM}"
  # Base GitHub App URL used to build installation links. The API appends
  # /installations/new when needed and carries encrypted CompanyHelm state through the flow.
  app_link: "${GITHUB_APP_URL}"
  # Shared secret GitHub sends with webhooks. Keep this optional locally because the API can
  # boot without webhook verification until a tunnel-backed GitHub App is configured.
  webhook_secret: "${?GITHUB_WEBHOOK_SECRET}"
  # Identifier embedded in encrypted GitHub installation callback state. It is separate from
  # the raw encryption key so rotated state payloads can be rejected or migrated intentionally.
  key_id: "companyhelm-local-github-state-key"
auth:
  provider: "clerk"
  clerk:
    secret_key: "${CLERK_SECRET_KEY}"
    publishable_key: "${CLERK_PUBLISHABLE_KEY}"
    jwks_url: "${CLERK_JWKS_URL}"
    authorized_parties:
      - "http://localhost:5173"
      - "http://localhost:4000"
  # To enable local auth instead of Clerk, switch provider to "local" and use:
  # local:
  #   password_pepper: "${LOCAL_AUTH_PASSWORD_PEPPER}"
  #   session_duration_hours: 168
  #   session_issuer: "companyhelm.local"
  #   session_secret: "${LOCAL_AUTH_SESSION_SECRET}"
  # To enable passwordless dev auth instead of Clerk, switch provider to "dev" and use:
  # dev: {}
security:
  encryption:
    key: "companyhelm-local-encryption-key"
    key_id: "companyhelm-local-key"
log:
  level: "info"
  json: false
