host: "0.0.0.0"
port: 4000
cors:
  origin:
    - "http://127.0.0.1:5173"
    - "http://localhost:5173"
  credentials: true
  methods:
    - "GET"
    - "POST"
    - "OPTIONS"
  allowed_headers:
    - "content-type"
    - "authorization"
graphql:
  endpoint: "/graphql"
  graphiql: true
publicUrl: "http://localhost:4000"
database:
  name: "companyhelm"
  host: "127.0.0.1"
  port: 5432
  roles:
    app_runtime:
      username: "app-runtime"
      password: "companyhelm-local-app-runtime-role-password"
    admin:
      username: "postgres"
      password: "postgres"
redis:
  host: "127.0.0.1"
  port: 6379
github:
  app_client_id: "${GITHUB_APP_CLIENT_ID}"
  app_private_key_pem: "${GITHUB_APP_PRIVATE_KEY_PEM}"
  app_link: "${GITHUB_APP_URL}"
auth:
  provider: "clerk"
  clerk:
    secret_key: "${CLERK_SECRET_KEY}"
    publishable_key: "${CLERK_PUBLISHABLE_KEY}"
    jwks_url: "${CLERK_JWKS_URL}"
    authorized_parties:
      - "http://localhost:5173"
      - "http://localhost:4000"
security:
  encryption:
    key: "companyhelm-local-encryption-key"
log:
  level: "debug"
  json: false
