include: "./local-dev.yaml"

publicUrl: "${COMPANYHELM_API_PUBLIC_URL}"
webPublicUrl: "${COMPANYHELM_WEB_PUBLIC_URL}"

cors:
  origin:
    - "http://127.0.0.1:5173"
    - "http://localhost:5173"
    - "${COMPANYHELM_WEB_PUBLIC_URL}"
  credentials: true
  methods:
    - "GET"
    - "POST"
    - "OPTIONS"
  allowed_headers:
    - "content-type"
    - "authorization"
    - "x-dev-user-id"
    - "x-dev-company-id"

auth:
  provider: "dev"
  clerk: null
  dev: {}
