type Query {
  health: String!
  Me: Me!
  Agent(id: ID!): Agent!
  Agents: [Agent!]!
  Sessions: [Session!]!
  AgentCreateOptions: [AgentCreateProviderOption!]!
  ModelProviderCredentialModels(modelProviderCredentialId: ID!): [ModelProviderCredentialModel!]!
  ModelProviderCredentials: [ModelProviderCredential!]!
}

type Mutation {
  AddAgent(input: AddAgentInput!): Agent!
  AddModelProviderCredential(input: AddModelProviderCredentialInput!): ModelProviderCredential!
  CreateSession(input: CreateSessionInput!): Session!
  DeleteAgent(input: DeleteAgentInput!): Agent!
  DeleteModelProviderCredential(input: DeleteModelProviderCredentialInput!): ModelProviderCredential!
  UpdateAgent(input: UpdateAgentInput!): Agent!
  RefreshModelProviderCredentialModels(
    input: RefreshModelProviderCredentialModelsInput!
  ): [ModelProviderCredentialModel!]!
}

type AuthenticatedCompany {
  id: ID!
  name: String!
}

type AuthenticatedUser {
  id: ID!
  email: String!
  firstName: String!
  lastName: String
  provider: String!
  providerSubject: String!
}

type MeUser {
  id: ID!
  email: String!
  firstName: String!
  lastName: String
}

type Me {
  user: MeUser!
  company: AuthenticatedCompany!
  serverVersion: String!
}

type Agent {
  id: ID!
  name: String!
  modelProviderCredentialId: ID
  modelProviderCredentialModelId: ID
  modelProvider: String
  modelName: String
  reasoningLevel: String
  systemPrompt: String
  createdAt: String!
  updatedAt: String!
}

type AgentCreateProviderOption {
  id: ID!
  label: String!
  modelProvider: String!
  defaultModelId: String
  defaultReasoningLevel: String
  models: [AgentCreateModelOption!]!
}

type AgentCreateModelOption {
  id: ID!
  modelId: String!
  name: String!
  description: String!
  reasoningLevels: [String!]!
}

type Session {
  id: ID!
  agentId: ID!
  modelId: String!
  reasoningLevel: String!
  userMessage: String!
  createdAt: String!
  updatedAt: String!
}

type ModelProviderCredential {
  id: ID!
  companyId: ID!
  name: String!
  modelProvider: String!
  defaultModelId: String
  defaultReasoningLevel: String
  type: String!
  refreshToken: String
  refreshedAt: String
  createdAt: String!
  updatedAt: String!
}

type ModelProviderCredentialModel {
  id: ID!
  modelProviderCredentialId: ID!
  modelId: String!
  name: String!
  description: String!
  reasoningLevels: [String!]!
}

input AddModelProviderCredentialInput {
  apiKey: String!
  name: String
  modelProvider: String!
}

input AddAgentInput {
  name: String!
  modelProviderCredentialId: ID!
  modelProviderCredentialModelId: ID!
  reasoningLevel: String
  systemPrompt: String
}

input UpdateAgentInput {
  id: ID!
  name: String!
  modelProviderCredentialId: ID!
  modelProviderCredentialModelId: ID!
  reasoningLevel: String
  systemPrompt: String
}

input DeleteModelProviderCredentialInput {
  id: ID!
}

input DeleteAgentInput {
  id: ID!
}

input CreateSessionInput {
  agentId: ID!
  modelId: String
  reasoningLevel: String
  userMessage: String!
}

input RefreshModelProviderCredentialModelsInput {
  modelProviderCredentialId: ID!
}
