type Query {
  health: String!
  Me: Me!
  Agent(id: ID!): Agent!
  Agents: [Agent!]!
  Sessions: [Session!]!
  SessionMessages: [SessionMessage!]!
  SessionTranscriptMessages(sessionId: ID!): [SessionMessage!]!
  AgentCreateOptions: [AgentCreateProviderOption!]!
  ModelProviderCredentialModels(modelProviderCredentialId: ID!): [ModelProviderCredentialModel!]!
  ModelProviderCredentials: [ModelProviderCredential!]!
  ModelProviders: [ModelProvider!]!
}

type Mutation {
  AddAgent(input: AddAgentInput!): Agent!
  AddModelProviderCredential(input: AddModelProviderCredentialInput!): ModelProviderCredential!
  ArchiveSession(input: ArchiveSessionInput!): Session!
  CreateSession(input: CreateSessionInput!): Session!
  DeleteAgent(input: DeleteAgentInput!): Agent!
  DeleteModelProviderCredential(input: DeleteModelProviderCredentialInput!): ModelProviderCredential!
  UpdateAgent(input: UpdateAgentInput!): Agent!
  RefreshModelProviderCredentialModels(
    input: RefreshModelProviderCredentialModelsInput!
  ): [ModelProviderCredentialModel!]!
}

type Subscription {
  SessionUpdated: Session!
  SessionMessageUpdated(sessionId: ID!): SessionMessage!
}

type AuthenticatedCompany {
  id: ID!
  name: String!
}

type AuthenticatedUser {
  id: ID!
  email: String!
  firstName: String!
  lastName: String
  provider: String!
  providerSubject: String!
}

type MeUser {
  id: ID!
  email: String!
  firstName: String!
  lastName: String
}

type Me {
  user: MeUser!
  company: AuthenticatedCompany!
  serverVersion: String!
}

type Agent {
  id: ID!
  name: String!
  modelProviderCredentialId: ID
  modelProviderCredentialModelId: ID
  modelProvider: String
  modelName: String
  reasoningLevel: String
  systemPrompt: String
  createdAt: String!
  updatedAt: String!
}

type AgentCreateProviderOption {
  id: ID!
  label: String!
  modelProvider: String!
  defaultModelId: String
  defaultReasoningLevel: String
  models: [AgentCreateModelOption!]!
}

type AgentCreateModelOption {
  id: ID!
  modelId: String!
  name: String!
  description: String!
  reasoningLevels: [String!]!
}

type Session {
  id: ID!
  agentId: ID!
  modelId: String!
  reasoningLevel: String!
  inferredTitle: String
  status: String!
  createdAt: String!
  updatedAt: String!
  userSetTitle: String
}

type SessionMessage {
  id: ID!
  sessionId: ID!
  role: String!
  status: String!
  text: String!
  isError: Boolean!
  createdAt: String!
  updatedAt: String!
}

type ModelProviderCredential {
  id: ID!
  companyId: ID!
  name: String!
  modelProvider: String!
  defaultModelId: String
  defaultReasoningLevel: String
  type: String!
  refreshToken: String
  refreshedAt: String
  createdAt: String!
  updatedAt: String!
}

type ModelProviderCredentialModel {
  id: ID!
  modelProviderCredentialId: ID!
  modelId: String!
  name: String!
  description: String!
  reasoningLevels: [String!]!
}

type ModelProvider {
  id: ID!
  name: String!
  type: String!
  authorizationInstructionsMarkdown: String
}

input AddModelProviderCredentialInput {
  accessToken: String
  accessTokenExpiresAtMilliseconds: String
  apiKey: String
  name: String
  modelProvider: String!
  refreshToken: String
}

input AddAgentInput {
  name: String!
  modelProviderCredentialId: ID!
  modelProviderCredentialModelId: ID!
  reasoningLevel: String
  systemPrompt: String
}

input UpdateAgentInput {
  id: ID!
  name: String!
  modelProviderCredentialId: ID!
  modelProviderCredentialModelId: ID!
  reasoningLevel: String
  systemPrompt: String
}

input DeleteModelProviderCredentialInput {
  id: ID!
}

input DeleteAgentInput {
  id: ID!
}

input ArchiveSessionInput {
  id: ID!
}

input CreateSessionInput {
  agentId: ID!
  modelId: String
  reasoningLevel: String
  sessionId: ID
  userMessage: String!
}

input RefreshModelProviderCredentialModelsInput {
  modelProviderCredentialId: ID!
}
