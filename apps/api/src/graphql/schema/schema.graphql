type Query {
  health: String!
  Me: Me!
  Agent(id: ID!): Agent!
  Agents: [Agent!]!
  ComputeProviderDefinitions: [ComputeProviderDefinition!]!
  Environments: [Environment!]!
  GithubAppConfig: GithubAppConfig!
  GithubInstallations: [GithubInstallation!]!
  GithubRepositories(installationId: ID): [GithubRepository!]!
  InboxHumanQuestions: [InboxHumanQuestion!]!
  Secrets: [Secret!]!
  AgentSecrets(agentId: ID!): [Secret!]!
  Sessions: [Session!]!
  SessionEnvironment(sessionId: ID!): SessionEnvironmentInfo!
  SessionSecrets(sessionId: ID!): [Secret!]!
  SessionMessages: [SessionMessage!]!
  SessionQueuedMessages(sessionId: ID!): [SessionQueuedMessage!]!
  SessionTranscriptMessages(
    sessionId: ID!
    first: Int!
    after: String
  ): SessionTranscriptMessageConnection!
  AgentCreateOptions: [AgentCreateProviderOption!]!
  ModelProviderCredentialModels(modelProviderCredentialId: ID!): [ModelProviderCredentialModel!]!
  ModelProviderCredentials: [ModelProviderCredential!]!
  ModelProviders: [ModelProvider!]!
  TaskCategories: [TaskCategory!]!
  Tasks: [Task!]!
}

type Mutation {
  AddAgent(input: AddAgentInput!): Agent!
  AddComputeProviderDefinition(input: AddComputeProviderDefinitionInput!): ComputeProviderDefinition!
  DeleteEnvironment(input: DeleteEnvironmentInput!): Environment!
  DeleteComputeProviderDefinition(input: DeleteComputeProviderDefinitionInput!): ComputeProviderDefinition!
  StartEnvironment(input: StartEnvironmentInput!): Environment!
  StopEnvironment(input: StopEnvironmentInput!): Environment!
  AddGithubInstallation(input: AddGithubInstallationInput!): AddGithubInstallationPayload!
  AddModelProviderCredential(input: AddModelProviderCredentialInput!): ModelProviderCredential!
  AttachSecretToAgent(input: AttachSecretToAgentInput!): Secret!
  AttachSecretToSession(input: AttachSecretToSessionInput!): Secret!
  ArchiveSession(input: ArchiveSessionInput!): Session!
  CreateSecret(input: CreateSecretInput!): Secret!
  CreateSession(input: CreateSessionInput!): Session!
  DeleteAgent(input: DeleteAgentInput!): Agent!
  DeleteGithubInstallation(input: DeleteGithubInstallationInput!): DeleteGithubInstallationPayload!
  DeleteModelProviderCredential(input: DeleteModelProviderCredentialInput!): ModelProviderCredential!
  DeleteSecret(input: DeleteSecretInput!): Secret!
  DetachSecretFromAgent(input: DetachSecretFromAgentInput!): Secret!
  DetachSecretFromSession(input: DetachSecretFromSessionInput!): Secret!
  PromptSession(input: PromptSessionInput!): Session!
  ResolveInboxHumanQuestion(input: ResolveInboxHumanQuestionInput!): InboxHumanQuestion!
  SteerSessionQueuedMessage(input: SteerSessionQueuedMessageInput!): SessionQueuedMessage!
  RefreshGithubInstallationRepositories(
    input: RefreshGithubInstallationRepositoriesInput!
  ): RefreshGithubInstallationRepositoriesPayload!
  UpdateAgentEnvironmentRequirements(
    input: UpdateAgentEnvironmentRequirementsInput!
  ): AgentEnvironmentRequirements!
  UpdateAgent(input: UpdateAgentInput!): Agent!
  UpdateComputeProviderDefinition(input: UpdateComputeProviderDefinitionInput!): ComputeProviderDefinition!
  CreateTask(input: CreateTaskInput!): Task!
  CreateTaskCategory(input: CreateTaskCategoryInput!): TaskCategory!
  RefreshModelProviderCredentialModels(
    input: RefreshModelProviderCredentialModelsInput!
  ): [ModelProviderCredentialModel!]!
  SetTaskCategory(input: SetTaskCategoryInput!): Task!
  UpdateSecret(input: UpdateSecretInput!): Secret!
}

type Subscription {
  SessionUpdated: Session!
  SessionMessageUpdated(sessionId: ID!): SessionMessage!
  SessionQueuedMessagesUpdated(sessionId: ID!): [SessionQueuedMessage!]!
}

