name: Publish Docker images

on:
  push:
    tags:
      - "v*"

env:
  AWS_REGION: us-west-2

jobs:
  publish-api:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::320042237800:role/GitHubActionsApiImagePublisherRole
          role-session-name: github-actions-api-image-publish
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Resolve API repository URI
        id: repository
        run: |
          REPOSITORY_URI="$(aws ecr describe-repositories \
            --region "$AWS_REGION" \
            --repository-names companyhelm-api \
            --query 'repositories[0].repositoryUri' \
            --output text)"

          if [ -z "$REPOSITORY_URI" ] || [ "$REPOSITORY_URI" = "None" ]; then
            echo "companyhelm-api private ECR repository was not found" >&2
            exit 1
          fi

          echo "repository_uri=$REPOSITORY_URI" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve package version
        id: version
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"

          if [ -z "$PACKAGE_VERSION" ]; then
            echo "package.json version is empty" >&2
            exit 1
          fi

          echo "package_version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"

      - name: Build and push API image
        env:
          ECR_REPOSITORY: ${{ steps.repository.outputs.repository_uri }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_SHA: ${{ github.sha }}
          PACKAGE_VERSION: ${{ steps.version.outputs.package_version }}
        run: |
          set -euo pipefail

          if [ "v$PACKAGE_VERSION" != "$GITHUB_REF_NAME" ]; then
            echo "Git tag $GITHUB_REF_NAME does not match package.json version $PACKAGE_VERSION" >&2
            exit 1
          fi

          git fetch origin main --depth=1
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main
          IMAGE_TAGS=("$ECR_REPOSITORY:$PACKAGE_VERSION")

          TAG_ARGS=()
          echo "Publishing image tags:"
          for image_tag in "${IMAGE_TAGS[@]}"; do
            echo "  $image_tag"
            TAG_ARGS+=(-t "$image_tag")
          done

          docker buildx build \
            --platform linux/amd64 \
            -f docker/api/Dockerfile \
            "${TAG_ARGS[@]}" \
            --push \
            .

  publish-web:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::320042237800:role/GitHubActionsWebImagePublisherRole
          role-session-name: github-actions-web-image-publish
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Resolve web repository URI
        id: repository
        run: |
          REPOSITORY_URI="$(aws ecr describe-repositories \
            --region "$AWS_REGION" \
            --repository-names companyhelm-web \
            --query 'repositories[0].repositoryUri' \
            --output text)"

          if [ -z "$REPOSITORY_URI" ] || [ "$REPOSITORY_URI" = "None" ]; then
            echo "companyhelm-web private ECR repository was not found" >&2
            exit 1
          fi

          echo "repository_uri=$REPOSITORY_URI" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve package version
        id: version
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"

          if [ -z "$PACKAGE_VERSION" ]; then
            echo "package.json version is empty" >&2
            exit 1
          fi

          echo "package_version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"

      - name: Build and push web image
        env:
          ECR_REPOSITORY: ${{ steps.repository.outputs.repository_uri }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_SHA: ${{ github.sha }}
          PACKAGE_VERSION: ${{ steps.version.outputs.package_version }}
        run: |
          set -euo pipefail

          if [ "v$PACKAGE_VERSION" != "$GITHUB_REF_NAME" ]; then
            echo "Git tag $GITHUB_REF_NAME does not match package.json version $PACKAGE_VERSION" >&2
            exit 1
          fi

          git fetch origin main --depth=1
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main
          IMAGE_TAGS=("$ECR_REPOSITORY:$PACKAGE_VERSION")

          TAG_ARGS=()
          echo "Publishing image tags:"
          for image_tag in "${IMAGE_TAGS[@]}"; do
            echo "  $image_tag"
            TAG_ARGS+=(-t "$image_tag")
          done

          docker buildx build \
            --platform linux/amd64 \
            -f docker/web/Dockerfile \
            "${TAG_ARGS[@]}" \
            --push \
            .
