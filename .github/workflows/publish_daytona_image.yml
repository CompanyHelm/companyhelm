name: Publish CompanyHelm Daytona image

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve package version
        id: version
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"

          if [ -z "$PACKAGE_VERSION" ]; then
            echo "package.json version is empty" >&2
            exit 1
          fi

          if [ "v$PACKAGE_VERSION" != "$GITHUB_REF_NAME" ]; then
            echo "Git tag $GITHUB_REF_NAME does not match package.json version $PACKAGE_VERSION" >&2
            exit 1
          fi

          echo "package_version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: docker/daytona
          file: docker/daytona/Dockerfile
          platforms: linux/amd64
          push: true
          tags: companyhelm/daytona:${{ steps.version.outputs.package_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
