name: Publish runner npm package

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Verify publishable packages
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate release ref
        run: |
          set -euo pipefail

          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            if [ "${GITHUB_REF}" != "refs/heads/main" ]; then
              echo "Manual npm publishing must be dispatched from main." >&2
              exit 1
            fi
          else
            if ! printf '%s' "${GITHUB_REF}" | grep -Eq '^refs/tags/v[0-9]+\.[0-9]+\.[0-9]+$'; then
              echo "Npm publishing tags must use vMAJOR.MINOR.PATCH format." >&2
              exit 1
            fi
          fi

          git fetch origin main
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" origin/main; then
            echo "Npm publishing ref must point at a commit contained in origin/main." >&2
            exit 1
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          registry-url: https://registry.npmjs.org

      - name: Use pinned npm
        run: npm install -g npm@11.6.2

      - name: Install dependencies
        run: npm ci

      - name: Verify publishable packages
        run: |
          npm run test:all
          npm run build

      - name: Pack publishable packages
        run: |
          set -euo pipefail
          mkdir -p npm-packages
          npm pack --workspace @companyhelm/runner --pack-destination npm-packages

      - name: Upload package tarballs
        uses: actions/upload-artifact@v4
        with:
          name: npm-packages
          path: npm-packages/*.tgz
          if-no-files-found: error

  publish:
    name: Publish runner package
    needs: verify
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download package tarballs
        uses: actions/download-artifact@v4
        with:
          name: npm-packages
          path: npm-packages

      - name: Set up Node.js for npm trusted publishing
        uses: actions/setup-node@v4
        with:
          node-version: 22.19.0
          registry-url: https://registry.npmjs.org

      - name: Use pinned npm for publishing
        run: npm install -g npm@11.6.2

      - name: Publish packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail

          if [ -n "${NODE_AUTH_TOKEN:-}" ]; then
            npm config set //registry.npmjs.org/:_authToken "${NODE_AUTH_TOKEN}"
          else
            npm config delete //registry.npmjs.org/:_authToken || true
            echo "NPM_TOKEN is not configured; attempting npm trusted publishing."
          fi

          publish_tarball() {
            local tarball="$1"
            local package_name
            local package_version
            package_name="$(tar -xOf "${tarball}" package/package.json | node -e "let data = ''; process.stdin.on('data', chunk => data += chunk); process.stdin.on('end', () => console.log(JSON.parse(data).name));")"
            package_version="$(tar -xOf "${tarball}" package/package.json | node -e "let data = ''; process.stdin.on('data', chunk => data += chunk); process.stdin.on('end', () => console.log(JSON.parse(data).version));")"

            case "${package_name}" in
              @companyhelm/runner)
                ;;
              *)
                echo "Unexpected package in publish artifact: ${package_name}" >&2
                exit 1
                ;;
            esac

            if npm view "${package_name}@${package_version}" version >/dev/null 2>&1; then
              echo "${package_name}@${package_version} is already published; skipping."
              return
            fi

            echo "Publishing ${package_name}@${package_version} from ${tarball}."
            npm publish "./${tarball}" --access public --provenance
          }

          shopt -s nullglob
          tarballs=(npm-packages/*.tgz)
          if [ "${#tarballs[@]}" -ne 1 ]; then
            echo "Expected exactly 1 npm package tarball, found ${#tarballs[@]}." >&2
            exit 1
          fi

          for tarball in "${tarballs[@]}"; do
            publish_tarball "${tarball}"
          done
